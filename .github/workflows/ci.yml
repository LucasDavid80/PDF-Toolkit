name: CI

on:
  push:
    branches: [ main ]
    tags: ['v*']
  pull_request:
    branches: [ main ]

jobs:
  lint_and_analyze:
    name: Lint and Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pdf_toolkit
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Format check
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint_and_analyze
    defaults:
      run:
        working-directory: pdf_toolkit
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Run tests with coverage
        run: flutter test --coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: pdf_toolkit/coverage/lcov.info

  dependency_check:
    name: Dependency Check
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: pdf_toolkit
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true
      - name: Run flutter pub outdated
        run: flutter pub outdated || true

  integration_test:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: pdf_toolkit
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libstdc++6 pkg-config xvfb
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Run integration tests (Linux headless via Xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum flutter test integration_test/app_test.dart -r expanded
        
      - name: Run integration tests (Windows / macOS)
        if: matrix.os != 'ubuntu-latest'
        run: flutter test integration_test/app_test.dart -r expanded

  build:
    name: Build & Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test, integration_test]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: pdf_toolkit
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libstdc++6 pkg-config curl
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true
          
      - name: Install dependencies
        run: flutter pub get
        
      # Build para Windows usando o script PowerShell da Fase 6
      - name: Build & Package Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Se os secrets do certificado existirem, grava no disco e assina
          if ("${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}" -ne "") {
            $certBytes = [System.Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}")
            [System.IO.File]::WriteAllBytes("windows/installer/cert.pfx", $certBytes)
            powershell -File windows/installer/build_installer.ps1 -CertPath "windows/installer/cert.pfx" -CertPassword "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"
          } else {
            powershell -File windows/installer/build_installer.ps1
          }
          
      # Build para macOS usando o script bash da Fase 6
      - name: Build & Package macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          # Executa o script oficial. Assinatura/notarizacao ocorrem se as chaves forem providas
          export MACOS_CERTIFICATE_DATA="${{ secrets.MACOS_CERTIFICATE_BASE64 }}"
          export MACOS_NOTARIZATION_KEY="${{ secrets.MACOS_NOTARIZATION_KEY }}"
          bash macos/build_macos.sh
          
      # Build para Linux usando o script bash da Fase 6
      - name: Build & Package Linux
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: bash linux/build_linux.sh
        
      # Upload do artefato empacotado e assinado gerado pelos scripts
      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: pdf_toolkit-windows-installer
          path: pdf_toolkit/build/windows/installer/pdf_toolkit_installer.exe
          
      - name: Upload macOS Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: pdf_toolkit-macos-dmg
          path: pdf_toolkit/build/macos/dmg/pdf_toolkit.dmg
          
      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: pdf_toolkit-linux-appimage
          path: pdf_toolkit/build/linux/pdf_toolkit.AppImage

  release:
    name: Release (on tag)
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          files: |
            artifacts/pdf_toolkit-windows-installer/pdf_toolkit_installer.exe
            artifacts/pdf_toolkit-macos-dmg/pdf_toolkit.dmg
            artifacts/pdf_toolkit-linux-appimage/pdf_toolkit.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify on success
    needs: [dependency_check, release, build]
    if: |
      always() &&
      needs.dependency_check.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.release.result == 'success' || needs.release.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Send email notification (if secrets available)
        if: ${{ secrets.SMTP_SERVER && secrets.SMTP_USERNAME && secrets.SMTP_PASSWORD && secrets.NOTIFY_EMAIL_TO }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || 587 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "PDF Toolkit CI: Build & Tests Passed"
          body: "Build, tests and integration tests passed. Artifacts attached."
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          attachments: artifacts/**
