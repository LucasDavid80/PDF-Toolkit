name: CI

on:
  push:
    branches: [ main ]
    tags: ['v*']
  pull_request:
    branches: [ main ]

jobs:
  lint_and_analyze:
    name: Lint and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Format check
        run: flutter format --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint_and_analyze
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - run: flutter pub get
      - name: Run tests with coverage
        run: flutter test --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

  dependency_check:
    name: Dependency check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Run flutter pub outdated
        run: flutter pub outdated || true

  integration_test:
    name: Integration tests
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Run integration tests
        run: flutter test integration_test/app_test.dart -r expanded

  build:
    name: Build matrix
    runs-on: ${{ matrix.os }}
    needs: [test, integration_test]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Build for platform
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            flutter build windows --release
            echo "build/windows/x64/runner/Release" > outdir.txt
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            flutter build macos --release
            echo "build/macos/Build/Products/Release" > outdir.txt
          else
            flutter build linux --release
            echo "build/linux/x64/release/bundle" > outdir.txt
          fi
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: ${{ steps.outdir.outputs.outdir }}

  release:
    name: Release (on tag)
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload build artifacts to release
        uses: softprops/action-gh-release@v1

  notify:
    name: Notify on success
    needs: [dependency_check, release, build]
    if: |
      always() &&
      needs.dependency_check.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.release.result == 'success' || needs.release.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Send email notification (if secrets available)
        if: ${{ secrets.SMTP_SERVER && secrets.SMTP_USERNAME && secrets.SMTP_PASSWORD && secrets.NOTIFY_EMAIL_TO }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || 587 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "PDF Toolkit CI: Build & Tests Passed"
          body: "Build, tests and integration tests passed. Artifacts attached."
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          attachments: artifacts/**
